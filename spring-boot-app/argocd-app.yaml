apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-app
  namespace: argocd
spec:
  project: default
  source:
    # URL of your GitHub repository
    repoURL: 'https://github.com/your-github-username/your-repo-name.git'
    targetRevision: HEAD
    # Target the directory containing deployment.yml and service.yml
    path: spring-boot-app-manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
